<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img"><style>text{font-family:Pretendard;letter-spacing:0}</style><defs><marker id="walkArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#1d76bb"/></marker><linearGradient id="walkGrad" x1="0" x2="1"><stop offset="0" stop-color="#e7f0e9"/><stop offset="1" stop-color="#eef3f8"/></linearGradient></defs><rect width="1120" height="620" rx="24" fill="#ffffff"/><rect x="22" y="22" width="1076" height="576" rx="20" fill="#fbfdff" stroke="#c5d9e8"/><text x="560" y="62" text-anchor="middle" font-size="29.4" font-weight="900" fill="#000000">RAHA walkthrough in one distillation step</text><text x="560" y="91" text-anchor="middle" font-size="14.7" fill="#000000">A real batch defines cross-modal relevance targets, while learned synthetic image-text pairs are the only optimized data.</text><rect x="40" y="126" width="192" height="356" rx="16" fill="#ffffff" stroke="#c5d9e8"/><text x="136" y="158" text-anchor="middle" font-size="15.7" font-weight="900" fill="#000000">1. Pair batches</text><text x="136" y="188" text-anchor="middle" font-size="12.7" fill="#000000">real batch = target</text><text x="136" y="209" text-anchor="middle" font-size="12.7" fill="#000000">synthetic set = learned</text><line x1="58" y1="228" x2="214" y2="228" stroke="#d8e5ee"/><rect x="72" y="252" width="34" height="27" rx="7" fill="#76a99a" stroke="#ffffff" stroke-width="3"/><rect x="118" y="255" width="82" height="21" rx="10.5" fill="#eef3f8" stroke="#cfdae8"/><line x1="108" y1="266" x2="118" y2="266" stroke="#94a8b9" stroke-width="2"/><rect x="72" y="298" width="34" height="27" rx="7" fill="#9fb7d9" stroke="#ffffff" stroke-width="3"/><rect x="118" y="301" width="82" height="21" rx="10.5" fill="#eef3f8" stroke="#cfdae8"/><line x1="108" y1="312" x2="118" y2="312" stroke="#94a8b9" stroke-width="2"/><rect x="72" y="344" width="34" height="27" rx="7" fill="#ead48f" stroke="#ffffff" stroke-width="3"/><rect x="118" y="347" width="82" height="21" rx="10.5" fill="#eef3f8" stroke="#cfdae8"/><line x1="108" y1="358" x2="118" y2="358" stroke="#94a8b9" stroke-width="2"/><rect x="68" y="406" width="136" height="36" rx="18" fill="#e7f0e9" stroke="#cbdccd"/><text x="136" y="429" text-anchor="middle" font-size="12.7" font-weight="850" fill="#000000">image-text pairs</text><rect x="252" y="126" width="192" height="356" rx="16" fill="#f7f1e8" stroke="#c5d9e8"/><text x="348" y="158" text-anchor="middle" font-size="15.7" font-weight="900" fill="#000000">2. Hyperbolic lift</text><text x="348" y="188" text-anchor="middle" font-size="12.7" fill="#000000">map embeddings to</text><text x="348" y="209" text-anchor="middle" font-size="12.7" fill="#000000">Lorentz geometry</text><line x1="270" y1="228" x2="426" y2="228" stroke="#d8e5ee"/><path d="M302 258C329 300 339 352 348 390C357 352 367 300 394 258Z" fill="#eef3f8" stroke="#b9ccdc"/><ellipse cx="348" cy="268" rx="46" ry="10" fill="none" stroke="#d9cec1"/><ellipse cx="348" cy="326" rx="28" ry="8" fill="none" stroke="#d9cec1"/><circle cx="330" cy="294" r="8" fill="#76a99a" stroke="#ffffff" stroke-width="3"/><circle cx="365" cy="338" r="8" fill="#9fb7d9" stroke="#ffffff" stroke-width="3"/><rect x="286" y="406" width="124" height="36" rx="18" fill="#eef3f8" stroke="#c5d9e8"/><text x="348" y="429" text-anchor="middle" font-size="12.7" font-weight="850" fill="#000000">hierarchy aware</text><rect x="464" y="126" width="192" height="356" rx="16" fill="#ffffff" stroke="#c5d9e8"/><text x="560" y="158" text-anchor="middle" font-size="15.7" font-weight="900" fill="#000000">3. Decompose</text><text x="560" y="188" text-anchor="middle" font-size="12.7" fill="#000000">SVD separates</text><text x="560" y="209" text-anchor="middle" font-size="12.7" fill="#000000">range and residual</text><line x1="482" y1="228" x2="638" y2="228" stroke="#d8e5ee"/><rect x="518" y="260" width="18" height="18" rx="3" fill="#9fb7d9" opacit