 opacity="0.95" transform="translate(66,66)"/><rect x="518" y="260" width="18" height="18" rx="3" fill="#9fb7d9" opacity="0.95" transform="translate(88,66)"/><rect x="518" y="260" width="18" height="18" rx="3" fill="#9fb7d9" opacity="0.28" transform="translate(0,88)"/><rect x="518" y="260" width="18" height="18" rx="3" fill="#9fb7d9" opacity="0.28" transform="translate(22,88)"/><rect x="518" y="260" width="18" height="18" rx="3" fill="#9fb7d9" opacity="0.28" transform="translate(44,88)"/><rect x="518" y="260" width="18" height="18" rx="3" fill="#9fb7d9" opacity="0.95" transform="translate(66,88)"/><rect x="518" y="260" width="18" height="18" rx="3" fill="#9fb7d9" opacity="0.95" transform="translate(88,88)"/><path d="M522 392H598" stroke="#76a99a" stroke-width="6" stroke-linecap="round"/><path d="M522 414H598" stroke="#d49a8c" stroke-width="5" stroke-linecap="round" stroke-dasharray="5 7"/><text x="610" y="397" font-size="12.2" font-weight="850" fill="#000000">range</text><text x="610" y="419" font-size="12.2" font-weight="850" fill="#000000">residual</text><rect x="676" y="126" width="192" height="356" rx="16" fill="#f7f1e8" stroke="#c5d9e8"/><text x="772" y="158" text-anchor="middle" font-size="15.7" font-weight="900" fill="#000000">4. Match relevance</text><text x="772" y="188" text-anchor="middle" font-size="12.7" fill="#000000">match dominant rank</text><text x="772" y="209" text-anchor="middle" font-size="12.7" fill="#000000">regularize remainder</text><line x1="694" y1="228" x2="850" y2="228" stroke="#d8e5ee"/><path d="M716 330C748 294 792 294 824 330" fill="none" stroke="#76a99a" stroke-width="8" stroke-linecap="round" opacity=".82"/><path d="M716 376C748 396 792 352 824 378" fill="none" stroke="#d49a8c" stroke-width="5.5" stroke-linecap="round" opacity=".7" stroke-dasharray="5 8"/><rect x="706" y="406" width="128" height="36" rx="18" fill="#e7f0e9" stroke="#cbdccd"/><text x="770" y="429" text-anchor="middle" font-size="12.7" font-weight="850" fill="#000000">real vs synthetic</text><rect x="888" y="126" width="192" height="356" rx="16" fill="#ffffff" stroke="#c5d9e8"/><text x="984" y="158" text-anchor="middle" font-size="15.7" font-weight="900" fill="#000000">5. Update synthetic set</text><text x="984" y="188" text-anchor="middle" font-size="12.7" fill="#000000">optimize N images</text><text x="984" y="209" text-anchor="middle" font-size="12.7" fill="#000000">N text embeddings</text><line x1="906" y1="228" x2="1062" y2="228" stroke="#d8e5ee"/><rect x="926" y="260" width="38" height="30" rx="8" fill="#76a99a" stroke="#ffffff" stroke-width="3"/><rect x="976" y="265" width="68" height="20" rx="10" fill="#eef3f8" stroke="#cfdae8"/><line x1="966" y1="275" x2="976" y2="275" stroke="#94a8b9" stroke-width="2"/><rect x="926" y="306" width="38" height="30" rx="8" fill="#9fb7d9" stroke="#ffffff" stroke-width="3"/><rect x="976" y="311" width="68" height="20" rx="10" fill="#eef3f8" stroke="#cfdae8"/><line x1="966" y1="321" x2="976" y2="321" stroke="#94a8b9" stroke-width="2"/><rect x="926" y="352" width="38" height="30" rx="8" fill="#ead48f" stroke="#ffffff" stroke-width="3"/><rect x="976" y="357" width="68" height="20" rx="10" fill="#eef3f8" stroke="#cfdae8"/><line x1="966" y1="367" x2="976" y2="367" stroke="#94a8b9" stroke-width="2"/><text x="945" y="333" text-anchor="middle" font-size="12.7" font-weight="900" fill="#000000">I</text><text x="1010" y="333" text-anchor="middle" font-size="12.7" font-weight="900" fill="#000000">T</text><text x="1058" y="335" text-anchor="middle" font-size="13.7" font-weight="900" fill="#000000">×N</text><path d="M1054 264C1072 292 1072 342 1054 370" fill="none" stroke="#1d76bb" stroke-width="3" stroke-linecap="round" marker-end="url(#walkArrow)"/><rect x="916" y="400" width="152" height="48" rx="18" fill="#eef3f8" stroke="#c5d9e8"/><text x="992" y="420" text-anchor="middle" font-size="12.2" font-weight="850" fill="#000000">N synthetic</text><text x="992" y="438" text-anchor="middle" font-size="12.2" font-weight="850" fill="#000000">image-text pairs</text><path d="M226 304H248" stroke="#1d76bb" stroke-width="3.2" stroke-linecap="round" marker-end="url(#walkArrow)"/><path d="M438 304H460" stroke="#1d76bb" stroke-width="3.2" stroke-linecap="round" marker-end="url(#walkArrow)"/><path d="M650 304H672" stroke="#1d76bb" stroke-width="3.2" stroke-linecap="round" marker-end="url(#walkArrow)"/><path d="M862 304H884" stroke="#1d76bb" stroke-width="3.2" stroke-linecap="round" marker-end="url(#walkArrow)"/><rect x="126" y="522" width="868" height="50" rx="18" fill="url(#walkGrad)" stroke="#cbdccd"/><text x="560" y="543" text-anchor="middle" font-size="13.7" font-weight="900" fill="#000000">Real batches define target image-text relevance.</text><text x="560" y="563" text-anchor="middle" font-size="13.7" font-weight="850" fill="#000000">Synthetic pairs are updated to reproduce it with far fewer pairs while preserving downstream utility.</text></svg>