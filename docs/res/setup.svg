<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 490" role="img"><style>text{font-family:Pretendard;letter-spacing:0}</style><defs><marker id="setupArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#1d76bb"/></marker></defs><rect width="1080" height="490" rx="24" fill="#ffffff"/><rect x="22" y="22" width="1036" height="446" rx="20" fill="#fbfdff" stroke="#c5d9e8"/><text x="540" y="62" text-anchor="middle" font-size="30.4" font-weight="900" fill="#000000">Vision-language dataset distillation setup</text><text x="540" y="91" text-anchor="middle" font-size="15.7" fill="#000000">Compress real image-text data into a compact learned set for efficient vision-language training.</text><rect x="50" y="124" width="260" height="274" rx="18" fill="#ffffff" stroke="#c5d9e8"/><text x="180.0" y="158" text-anchor="middle" font-size="18.6" font-weight="900" fill="#000000">Input</text><text x="180.0" y="190" text-anchor="middle" font-size="13.7" fill="#000000">Large real paired dataset</text><text x="180.0" y="213" text-anchor="middle" font-size="13.7" fill="#000000">many image-text examples</text><text x="180.0" y="236" text-anchor="middle" font-size="13.7" fill="#000000">rich but costly to train</text><line x1="74" y1="254" x2="286" y2="254" stroke="#d6ebf8" stroke-width="1.4"/><rect x="82" y="278" width="24" height="20" rx="5" fill="#76a99a" opacity="0.56"/><rect x="114" y="280" width="76" height="16" rx="8" fill="#eef3f8" stroke="#cfdae8"/><rect x="194" y="278" width="24" height="20" rx="5" fill="#76a99a" opacity="0.82"/><rect x="226" y="280" width="76" height="16" rx="8" fill="#eef3f8" stroke="#cfdae8"/><rect x="82" y="316" width="24" height="20" rx="5" fill="#76a99a" opacity="0.82"/><rect x="114" y="318" width="76" height="16" rx="8" fill="#eef3f8" stroke="#cfdae8"/><rect x="194" y="316" width="24" height="20" rx="5" fill="#76a99a" opacity="0.56"/><rect x="226" y="318" width="76" height="16" rx="8" fill="#eef3f8" stroke="#cfdae8"/><rect x="82" y="354" width="24" height="20" rx="5" fill="#76a99a" opacity="0.56"/><rect x="114" y="356" width="76" height="16" rx="8" fill="#eef3f8" stroke="#cfdae8"/><rect x="194" y="354" width="24" height="20" rx="5" fill="#76a99a" opacity="0.82"/><rect x="226" y="356" width="76" height="16" rx="8" fill="#eef3f8" stroke="#cfdae8"/><text x="180" y="383" text-anchor="middle" font-size="12.7" font-weight="850" fill="#000000">real images + real text</text><rect x="390" y="124" width="300" height="274" rx="18" fill="#f7f1e8" stroke="#c5d9e8"/><text x="540.0" y="158" text-anchor="middle" font-size="18.6" font-weight="900" fill="#000000">RAHA distillation</text><text x="540.0" y="190" text-anchor="middle" font-size="13.7" fill="#000000">Learn synthetic pixels</text><text x="540.0" y="213" text-anchor="middle" font-size="13.7" fill="#000000">learn text embeddings</text><text x="540.0" y="236" text-anchor="middle" font-size="13.7" fill="#000000">match cross-relevance</text><line x1="414" y1="254" x2="666" y2="254" stroke="#d6ebf8" stroke-width="1.4"/><circle cx="474" cy="310" r="34" fill="#e7f0e9" stroke="#cbdccd"/><text x="474" y="317" text-anchor="middle" font-size="19.6" font-weight="900" fill="#000000">I</text><circle cx="574" cy="310" r="34" fill="#eef3f8" stroke="#cfdae8"/><text x="574" y="317" text-anchor="middle" font-size="19.6" font-weight="900" fill="#000000">T</text><path d="M511 310H535" stroke="#1d76bb" stroke-width="3" stroke-linecap="round" marker-end="url(#setupArrow)"/><path d="M615 309C646 294 660 294 678 309" fill="none" stroke="#1d76bb" stroke-width="3" stroke-linecap="round" marker-end="url(#setupArrow)"/><text x="540" y="383" text-anchor="middle" font-size="12.7" font-weight="850" fill="#000000">optimize compact image-text pairs</text><rect x="770" y="124" width="260" height="274" rx="18" fill="#ffffff" stroke="#c5d9e8"/><text x="900.0" y="158" text-anchor="middle" font-size="18.6" font-weight="900" fill="#000000">Output</text><text x="900.0" y="190" text-anchor="middle" font-size="13.7" fill="#000000">Small synthetic dataset</text><text x="900.0" y="213" text-anchor="middle" font-size="13.7" fill="#000000">reused for training</text><text x="900.0" y="236" text-anchor="middle" font-size="13.7" fill="#000000">keeps downstream utility</text><line x1="794" y1="254" x2="1006" y2="254" stroke="#d6ebf8" stroke-width="1.4"/><rect x="812" y="276" width="32" height="28" rx="7" fill="#76a99a" opacity=".84" stroke="#ffffff" stroke-width="3"/><rect x="854" y="281" width="72" height="18" rx="9" fill="#eef3f8" stroke="#cfdae8"/><rect x="904" y="276" width="32" height="28" rx="7" fill="#9fb7d9" opacity=".84" stroke="#ffffff" stroke-width="3"/><rect x="946" y="281" width="72" height="18" rx="9" fill="#eef3f8" stroke="#cfdae8"/><rect x="812" y="326" width="32" height="28" rx="7" fill="#ead48f" opacity=".84" stroke="#ffffff" stroke-width="3"/><rect x="854" y="331" width="72" height="18" rx="9" fill="#eef3f8" stroke="#cfdae8"/><rect x="904" y="326" width="32" height="28" rx="7" fill="#bfd4a7" opacity=".84" stroke="#ffffff" stroke-width="3"/><rect x="946" y="331" width="72" height="18" rx="9" fill="#eef3f8" stroke="#cfdae8"/><text x="900" y="383" text-anchor="middle" font-size="12.7" font-weight="850" fill="#000000">learned images + learned text embeddings</text><path d="M326 260H374" stroke="#1d76bb" stroke-width="4" stroke-linecap="round" marker-end="url(#setupArrow)"/><text x="350" y="242" text-anchor="middle" font-size="11.8" font-weight="850" fill="#000000">distill</text><path d="M706 260H754" stroke="#1d76bb" stroke-width="4" stroke-linecap="round" marker-end="url(#setupArrow)"/><text x="730" y="242" text-anchor="middle" font-size="11.8" font-weight="850" fill="#000000">reuse</text><rect x="180" y="424" width="720" height="34" rx="17" fill="#e7f0e9" stroke="#cbdccd"/><text x="540" y="446" text-anchor="middle" font-size="13.7" font-weight="900" fill="#000000">Train the same vision-language model faster, then evaluate retrieval, transfer, and prompted classification.</text></svg>